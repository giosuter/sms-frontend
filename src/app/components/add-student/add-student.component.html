<div class="container mt-4">
    <h2 class="text-center">Add New Student</h2>
  
    <form (ngSubmit)="onSubmit()" class="card p-4 shadow-sm">
      <div class="mb-3">
        <label for="firstName" class="form-label">First Name</label>
        <input type="text" id="firstName" [(ngModel)]="student.firstName" name="firstName" class="form-control" required />
      </div>
  
      <div class="mb-3">
        <label for="lastName" class="form-label">Last Name</label>
        <input type="text" id="lastName" [(ngModel)]="student.lastName" name="lastName" class="form-control" required />
      </div>
  
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" [(ngModel)]="student.email" name="email" class="form-control" required />
      </div>
  
      <button type="submit" class="btn btn-success">✅ Add Student</button>
      <a routerLink="/" class="btn btn-secondary ms-2">⬅ Back</a>
    </form>
  </div>
